name: test

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
      - run: moon version
      - run: npm ci
      # Pure logic packages on the native backend (fast, inequality bands).
      - run: moon test
      # Everything incl. the JS-only game/ffi packages; bit-exact physics parity.
      - run: moon test --target js
      # The logic layer compiles to JS and the web app bundles importing it.
      - run: moon build --target js --release
      - run: npm run build
