<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>tetetetennis</title>
  <meta name="description" content="A free, open-source browser 3D tennis game — one set, you vs the CPU, first-person." />

  <!-- Open Graph / Twitter Card: rich link previews when the URL is shared.
       Crawlers don't run JS and need ABSOLUTE urls, so these point at the
       GitHub Pages site. Update the two URLs if the repo/domain changes. -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="tetetetennis" />
  <meta property="og:title" content="tetetetennis" />
  <meta property="og:description" content="A free, open-source browser 3D tennis game — one set, you vs the CPU, first-person." />
  <meta property="og:url" content="https://ryogrid.github.io/tetetennis/" />
  <meta property="og:image" content="https://ryogrid.github.io/tetetennis/icon-512.png" />
  <meta property="og:image:type" content="image/png" />
  <meta property="og:image:width" content="512" />
  <meta property="og:image:height" content="512" />
  <meta property="og:image:alt" content="tetetetennis — browser 3D tennis game" />
  <meta property="og:locale" content="en" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="tetetetennis" />
  <meta name="twitter:description" content="A free, open-source browser 3D tennis game — one set, you vs the CPU, first-person." />
  <meta name="twitter:image" content="https://ryogrid.github.io/tetetennis/icon-512.png" />

  <!-- PWA: relative hrefs resolve against the page URL, so they work at the
       dev root and under the GitHub Pages project path alike -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0d0d14" />
  <link rel="icon" type="image/png" href="icon-192.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="tetetennis" />
  <style>
    html, body {
      margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0d0d14;
      touch-action: manipulation; overscroll-behavior: none;
      -webkit-user-select: none; user-select: none; -webkit-touch-callout: none;
    }
    #app { position: fixed; inset: 0; }
    #app canvas { display: block; }
    #hud { position: fixed; inset: 0; pointer-events: none; font-family: 'Segoe UI', Arial, sans-serif; color: #fff; }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="hud"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
